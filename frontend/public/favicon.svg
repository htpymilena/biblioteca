<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!-- Ears / Horns -->
  <polygon points="12,24 16,8 28,16" fill="#172554" />
  <polygon points="52,24 48,8 36,16" fill="#172554" />
  <!-- Body/Head -->
  <path d="M12 24 C12 10, 52 10, 52 24 C52 42, 44 54, 32 54 C20 54, 12 42, 12 24 Z" fill="#1e3a8a" />
  <!-- Breast/Belly -->
  <path d="M20 34 C20 28, 44 28, 44 34 C44 46, 38 50, 32 50 C26 50, 20 46, 20 34 Z" fill="#eff6ff" />
  <!-- Breast feathers (chevrons) -->
  <path d="M28 36 L32 40 L36 36 M28 42 L32 46 L36 42" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Eyes (White outer circles) -->
  <circle cx="23" cy="22" r="7" fill="#ffffff" />
  <circle cx="41" cy="22" r="7" fill="#ffffff" />
  <!-- Pupils (Dark blue circles) -->
  <circle cx="23" cy="22" r="3.5" fill="#172554" />
  <circle cx="41" cy="22" r="3.5" fill="#172554" />
