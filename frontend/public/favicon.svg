  <circle cx="24.5" cy="20.5" r="1.2" fill="#ffffff" />
  <circle cx="42.5" cy="20.5" r="1.2" fill="#ffffff" />
  <!-- Beak (Yellow-gold triangle) -->
  <polygon points="32,24 29,31 35,31" fill="#fbbf24" />
  <!-- Feet -->
  <circle cx="24" cy="54" r="3" fill="#fbbf24" />
  <circle cx="40" cy="54" r="3" fill="#fbbf24" />
</svg>